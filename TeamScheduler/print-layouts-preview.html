<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>תצוגות הדפסה — אפשרויות</title>
<style>
  *{box-sizing:border-box}
  body{margin:0;background:#e9e6df;color:#16202b;
    font-family:"Segoe UI","Assistant",system-ui,sans-serif;font-size:14px}

  /* --- screen toolbar (never printed) --- */
  .bar{position:sticky;top:0;z-index:10;background:#16202b;color:#f7f5f0;
    padding:12px 20px;display:flex;gap:14px;align-items:center;flex-wrap:wrap}
  .bar h1{font-size:16px;margin:0;font-weight:650}
  .bar p{margin:0;font-size:12px;color:#c9c4b8;flex:1;min-width:200px}
  .bar button{background:#f7f5f0;color:#16202b;border:0;border-radius:3px;
    padding:6px 12px;font:inherit;font-size:12px;cursor:pointer}
  .bar button:hover{opacity:.9}

  /* --- each option shown as an A4-like sheet on screen --- */
  .opt{max-width:820px;margin:22px auto;background:#fff;
    box-shadow:0 4px 18px rgba(0,0,0,.18);padding:26px 30px 34px}
  .optlabel{display:flex;align-items:center;justify-content:space-between;
    gap:12px;margin:0 auto 6px;max-width:820px;padding:0 4px}
  .optlabel .tag{background:#16202b;color:#fff;font-size:12px;font-weight:650;
    padding:3px 10px;border-radius:3px}
  .optlabel .who{font-size:12px;color:#5c5548}
  .optlabel button{background:#fff;border:1px solid #a8a091;border-radius:3px;
    padding:4px 12px;font:inherit;font-size:12px;cursor:pointer}

  /* --- shared report typography (this is the actual print styling) --- */
  .rpt{color:#16202b}
  .rpt .rhead{border-bottom:2px solid #16202b;padding-bottom:8px;margin-bottom:14px}
  .rpt .rhead h2{font-size:18px;font-weight:650;margin:0 0 4px;letter-spacing:-.01em}
  .rpt .rhead .meta{font-size:12px;color:#444;display:flex;gap:16px;flex-wrap:wrap;
    font-variant-numeric:tabular-nums}

  table.r{border-collapse:collapse;width:100%;font-size:12.5px}
  table.r th,table.r td{border:1px solid #b8b1a4;padding:5px 8px;text-align:right;
    vertical-align:top}
  table.r thead th{background:#efece5;font-weight:650;border-bottom:2px solid #16202b}
  table.r td.num,table.r th.num{font-variant-numeric:tabular-nums;white-space:nowrap}
  table.r tfoot td{border:0;padding-top:8px;font-weight:650;text-align:left}
  .muted{color:#6b6456}

  /* weekly text grid */
  table.grid{border-collapse:collapse;width:100%;font-size:12px;table-layout:fixed}
  table.grid th,table.grid td{border:1px solid #b8b1a4;padding:5px 6px;vertical-align:top}
  table.grid thead th{background:#efece5;border-bottom:2px solid #16202b;text-align:center}
  table.grid th.nm{width:110px;text-align:right}
  table.grid td.nm{font-weight:600;background:#faf9f6}
  .gtask{margin-bottom:5px;line-height:1.25}
  .gtask .gt{font-variant-numeric:tabular-nums;font-weight:600}
  .gtask .gp{display:block;font-size:10px;color:#5c5548}

  /* project-grouped */
  .pgroup{margin-bottom:16px;break-inside:avoid}
  .pgroup .gh{display:flex;align-items:baseline;gap:10px;border-bottom:1.5px solid #16202b;
    padding:0 0 4px;margin-bottom:6px}
  .pgroup .gh b{font-size:15px}
  .pgroup .gh .env{font-size:11px;color:#5c5548}
  .pgroup .gh .hrs{margin-inline-start:auto;font-size:12px;font-weight:650;
    font-variant-numeric:tabular-nums}
  .pgroup ul{list-style:none;margin:0;padding:0}
  .pgroup li{display:grid;grid-template-columns:120px 90px 120px 1fr;gap:10px;
    font-size:12.5px;padding:3px 4px;border-bottom:1px dotted #cfc9bc;
    font-variant-numeric:tabular-nums}
  .pgroup li span:last-child{font-variant-numeric:normal}

  /* personal agenda */
  .person{break-inside:avoid;margin-bottom:26px}
  .person .ph{display:flex;align-items:baseline;gap:12px;border-bottom:2px solid #16202b;
    padding-bottom:6px;margin-bottom:10px}
  .person .ph h3{font-size:16px;margin:0;font-weight:650}
  .person .ph .tot{margin-inline-start:auto;font-size:12px;font-weight:650;
    font-variant-numeric:tabular-nums}
  .day{margin:0 0 4px;font-size:12px;font-weight:650;color:#5c5548;
    border-bottom:1px dotted #cfc9bc;padding-bottom:2px;margin-top:10px}
  .arow{display:grid;grid-template-columns:120px 1fr auto;gap:12px;
    font-size:13px;padding:3px 2px;align-items:baseline}
  .arow .at{font-variant-numeric:tabular-nums;white-space:nowrap}
  .arow .ac{color:#5c5548;font-size:11px;white-space:nowrap}

  @media print{
    body{background:#fff}
    .bar,.optlabel{display:none !important}
    .opt{box-shadow:none;margin:0;max-width:none;padding:0}
    .noprint{display:none !important}
    .opt{page-break-after:always}
    .person{page-break-inside:avoid}
    /* uncomment to force one person per page in the agenda layouts:
       .person{page-break-after:always} */
  }
</style>
</head>
<body>
<div class="bar">
  <h1>תצוגות הדפסה — 5 אפשרויות</h1>
  <p>גלול לראות כל אפשרות. לחץ "הדפסה/תצוגה" על אפשרות כדי לראות אותה לבד ב־A4 (Ctrl+P). אחר כך תבחר: פריסה אחת למנהל + פריסה אחת לעובד.</p>
  <button onclick="window.print()">הדפס הכל</button>
</div>

<div id="stage"></div>

<script>
// ---------- sample data (Sun–Thu week of 14/7) ----------
const DAYS = ["ראשון","שני","שלישי","רביעי","חמישי"];
const DATES = ["14/7","15/7","16/7","17/7","18/7"];
const people = ["נועה לוי","דנה כהן","יוסי מזרחי"];
const PROJ = {
  sh: { name:"שדרוג גרסה",  env:"פרוד",   cust:"לקוח א׳" },
  tx: { name:"תחזוקה שוטפת", env:"פיתוח",  cust:"לקוח א׳" },
  mg: { name:"מיגרציה",      env:"בדיקות", cust:"לקוח ב׳" },
};
// task: [person, dayIdx, startMin, durMin, projKey, title]
const T = [
  ["נועה לוי",0,8*60,   90, "sh","פריסת שרת"],
  ["נועה לוי",0,10*60,  60, "tx","גיבוי יומי"],
  ["נועה לוי",1,9*60,   90, "sh","בדיקות רגרסיה"],
  ["נועה לוי",4,13*60,  60, "tx","פגישת סטטוס"],
  ["דנה כהן",0,11*60,  120, "mg","העברת נתונים"],
  ["דנה כהן",1,9*60+30, 90, "sh","סקירת קוד"],
  ["דנה כהן",2,14*60,   60, "mg","אימות תוצאות"],
  ["יוסי מזרחי",0,9*60, 60, "tx","ניטור מערכות"],
  ["יוסי מזרחי",2,10*60,120,"mg","הגדרת סביבה"],
  ["יוסי מזרחי",3,8*60+30,90,"sh","תיעוד"],
  ["יוסי מזרחי",4,11*60, 60, "tx","טיפול בתקלות"],
];
const tasks = T.map(([person,day,start,dur,pk,title])=>({
  person, day, start, dur, pk,
  proj: PROJ[pk].name, env: PROJ[pk].env, cust: PROJ[pk].cust, title
}));

const hh = m => String(Math.floor(m/60)).padStart(2,"0")+":"+String(m%60).padStart(2,"0");
const span = t => `${hh(t.start)}–${hh(t.start+t.dur)}`;
const hrs = m => (m/60).toFixed(1);
const totalMin = list => list.reduce((a,t)=>a+t.dur,0);
const byStart = (a,b)=> a.day-b.day || a.start-b.start;

function rhead(title, metaBits){
  return `<div class="rhead"><h2>${title}</h2>
    <div class="meta">${metaBits.map(b=>`<span>${b}</span>`).join("")}</div></div>`;
}

// ---------- Option 1 (manager): flat task table ----------
function optTable(){
  const rows = tasks.slice().sort((a,b)=> people.indexOf(a.person)-people.indexOf(b.person) || byStart(a,b));
  const body = rows.map(t=>`<tr>
      <td>${t.person}</td>
      <td class="num">${DAYS[t.day].slice(0,3)}׳ ${DATES[t.day]}</td>
      <td class="num">${span(t)}</td>
      <td class="num">${hrs(t.dur)}</td>
      <td>${t.title}</td>
      <td>${t.proj}</td>
      <td>${t.env}</td>
      <td>${t.cust}</td>
    </tr>`).join("");
  return `<div class="rpt">
    ${rhead("דוח משימות · כל הצוות", ["שבוע 14–18/7", `${rows.length} משימות`, `סה״כ ${hrs(totalMin(rows))} ש׳`])}
    <table class="r"><thead><tr>
      <th>עובד</th><th>יום</th><th>שעה</th><th class="num">משך</th>
      <th>משימה</th><th>פרויקט</th><th>סביבה</th><th>לקוח</th>
    </tr></thead><tbody>${body}</tbody>
    <tfoot><tr><td colspan="8">סה״כ שבועי: ${hrs(totalMin(rows))} שעות · ${rows.length} משימות</td></tr></tfoot>
    </table></div>`;
}

// ---------- Option 2 (manager): text weekly grid ----------
function optGrid(){
  const head = `<tr><th class="nm">שם</th>${
    DAYS.map((d,i)=>`<th>${d}<br><span class="muted">${DATES[i]}</span></th>`).join("")}</tr>`;
  const body = people.map(p=>{
    const cells = DAYS.map((_,di)=>{
      const list = tasks.filter(t=>t.person===p && t.day===di).sort(byStart);
      if(!list.length) return `<td></td>`;
      return `<td>${list.map(t=>`<div class="gtask">
          <span class="gt">${hh(t.start)}</span> ${t.title}
          <span class="gp">${t.proj} · ${t.env}</span></div>`).join("")}</td>`;
    }).join("");
    return `<tr><td class="nm">${p}<br><span class="muted" style="font-weight:400">${hrs(totalMin(tasks.filter(t=>t.person===p)))} ש׳</span></td>${cells}</tr>`;
  }).join("");
  return `<div class="rpt">
    ${rhead("לוח שבועי · כל הצוות", ["שבוע 14–18/7", `סה״כ ${hrs(totalMin(tasks))} ש׳`])}
    <table class="grid"><thead>${head}</thead><tbody>${body}</tbody></table></div>`;
}

// ---------- Option 3 (manager): grouped by project ----------
function optProject(){
  const groups = Object.keys(PROJ).map(pk=>{
    const list = tasks.filter(t=>t.pk===pk).sort(byStart);
    return { pk, list };
  }).filter(g=>g.list.length);
  const html = groups.map(({pk,list})=>{
    const pr = PROJ[pk];
    const rows = list.map(t=>`<li>
        <span>${t.person}</span>
        <span>${DAYS[t.day].slice(0,3)}׳ ${DATES[t.day]}</span>
        <span>${span(t)}</span>
        <span>${t.title}</span>
      </li>`).join("");
    return `<div class="pgroup">
      <div class="gh"><b>${pr.name}</b><span class="env">${pr.cust} › ${pr.env}</span>
        <span class="hrs">${hrs(totalMin(list))} ש׳ · ${list.length} משימות</span></div>
      <ul>${rows}</ul></div>`;
  }).join("");
  return `<div class="rpt">
    ${rhead("דוח לפי פרויקט · כל הצוות", ["שבוע 14–18/7", `${groups.length} פרויקטים`, `סה״כ ${hrs(totalMin(tasks))} ש׳`])}
    ${html}</div>`;
}

// ---------- Option 4 (person): personal agenda ----------
function optAgenda(){
  const cards = people.map(p=>{
    const mine = tasks.filter(t=>t.person===p).sort(byStart);
    let body = "";
    let last = -1;
    for(const t of mine){
      if(t.day!==last){ body += `<div class="day">${DAYS[t.day]} · ${DATES[t.day]}</div>`; last=t.day; }
      body += `<div class="arow">
        <span class="at">${span(t)}</span>
        <span>${t.title}</span>
        <span class="ac">${t.proj} · ${t.env} · ${t.cust}</span></div>`;
    }
    return `<div class="person">
      <div class="ph"><h3>${p}</h3><span class="muted">שבוע 14–18/7</span>
        <span class="tot">סה״כ ${hrs(totalMin(mine))} ש׳ · ${mine.length} משימות</span></div>
      ${body || '<div class="muted">אין משימות השבוע</div>'}</div>`;
  }).join("");
  return `<div class="rpt">
    ${rhead("יומן אישי · לפי עובד", ["שבוע 14–18/7", "כל עובד מתחיל בעמוד/כרטיס משלו"])}
    ${cards}</div>`;
}

// ---------- Option 5 (person): personal table ----------
function optPersonTable(){
  const cards = people.map(p=>{
    const mine = tasks.filter(t=>t.person===p).sort(byStart);
    const rows = mine.map(t=>`<tr>
        <td class="num">${DAYS[t.day].slice(0,3)}׳ ${DATES[t.day]}</td>
        <td class="num">${span(t)}</td>
        <td class="num">${hrs(t.dur)}</td>
        <td>${t.title}</td>
        <td>${t.proj} / ${t.env}</td>
      </tr>`).join("");
    return `<div class="person">
      <div class="ph"><h3>${p}</h3><span class="muted">שבוע 14–18/7</span>
        <span class="tot">סה״כ ${hrs(totalMin(mine))} ש׳</span></div>
      <table class="r"><thead><tr>
        <th>יום</th><th>שעה</th><th class="num">משך</th><th>משימה</th><th>פרויקט / סביבה</th>
      </tr></thead><tbody>${rows}</tbody></table></div>`;
  }).join("");
  return `<div class="rpt">
    ${rhead("טבלה אישית · לפי עובד", ["שבוע 14–18/7"])}
    ${cards}</div>`;
}

// ---------- assemble ----------
const OPTIONS = [
  { id:"opt1", tag:"אפשרות 1", who:"למנהל · טבלת משימות", fn:optTable },
  { id:"opt2", tag:"אפשרות 2", who:"למנהל · רשת שבועית טקסט", fn:optGrid },
  { id:"opt3", tag:"אפשרות 3", who:"למנהל · דוח לפי פרויקט", fn:optProject },
  { id:"opt4", tag:"אפשרות 4", who:"לעובד · יומן אישי", fn:optAgenda },
  { id:"opt5", tag:"אפשרות 5", who:"לעובד · טבלה אישית", fn:optPersonTable },
];
document.getElementById("stage").innerHTML = OPTIONS.map(o=>
  `<div class="optlabel">
     <span><span class="tag">${o.tag}</span> <span class="who">${o.who}</span></span>
     <button onclick="printOnly('${o.id}')">הדפסה / תצוגת A4 של אפשרות זו ←</button>
   </div>
   <div class="opt" id="${o.id}">${o.fn()}</div>`).join("");

// print a single option: hide the others just for the print job
function printOnly(id){
  document.querySelectorAll(".opt").forEach(o=> o.classList.toggle("noprint", o.id!==id));
  window.onafterprint = ()=> document.querySelectorAll(".opt").forEach(o=> o.classList.remove("noprint"));
  window.print();
}
</script>
</body>
</html>
